bundle:
  name: autoloader-console

variables:
  app_name:
    description: Deployed Databricks App name
    default: autoloader-console
  uc_catalog:
    description: >-
      Unity Catalog (Delta) catalog for the framework's DATA layer that the Console
      publishes into and reads Bronze/audit analytics from (`<catalog>.metadata.*`,
      `<catalog>.bronze.*`, `<catalog>.information_schema.*`). Default `autoloader_console`.
      NOTE: this is the UC catalog, a DIFFERENT layer from the Lakebase Postgres
      `metadata_console` schema (env METADATA_SCHEMA). Threaded to the app runtime via the
      `UC_CATALOG` env in app.yaml; set the matching env at client/query build time to retarget.
    default: autoloader_console
  sql_warehouse_id:
    description: SQL Warehouse ID
  postgres_branch:
    description: Full Lakebase Postgres branch resource name. Obtain by running `databricks postgres list-branches {project-name}`, select the desired item from the output array and use its .name value. Requires the project resource name.
  postgres_database:
    description: Full Lakebase Postgres database resource name. Obtain by running `databricks postgres list-databases {branch-name}`, select the desired item from the output array and use its .name value. Requires the branch resource name.
  postgres_project:
    description: Full Lakebase Postgres project resource name. Obtain by running `databricks postgres list-projects`, select the desired item from the output array and use its .name value.

resources:
  apps:
    app:
      name: ${var.app_name}
      description: "Autoloader Console — Overview, Operations, Detail, Onboarding & Observability for the metadata-driven Auto Loader framework"
      source_code_path: ./
      # Uncomment to enable on behalf of user API scopes. Available scopes: sql, dashboards.genie, files.files, serving.serving-endpoints
      # user_api_scopes:
      #   - sql

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: postgres
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE

targets:
  default:
    default: true
    workspace:
      host: https://adb-7405612437610096.16.azuredatabricks.net

    variables:
      sql_warehouse_id: a731a35f3f8cdef6
      postgres_branch: projects/autoloader-meta/branches/production
      postgres_database: projects/autoloader-meta/branches/production/databases/databricks-postgres
      postgres_project: projects/autoloader-meta
