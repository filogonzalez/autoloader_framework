command: ['npm', 'run', 'start']
env:
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: LAKEBASE_ENDPOINT
    valueFrom: postgres
  # Isolated metadata schema for the Console. Keeps the Console off the live
  # `metadata` schema used by the autoloader-sources app (shared Lakebase instance).
  # LAYER: Lakebase Postgres (NOT Unity Catalog).
  - name: METADATA_SCHEMA
    value: metadata_console
  # Unity Catalog (Delta) catalog for the framework DATA layer the Console reads/writes
  # (publish target + Bronze/audit analytics). LAYER: Unity Catalog (NOT Lakebase).
  # Mirrors the `uc_catalog` DABs variable; default autoloader_console.
  - name: UC_CATALOG
    value: autoloader_console
