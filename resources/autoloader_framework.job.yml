# Lakeflow Job that runs the metadata-driven Auto Loader demo end to end on serverless.
# Deploy with:  databricks bundle deploy -t dev
# Run with:     databricks bundle run autoloader_framework_demo -t dev
#
# Fully self-contained: setup runs the DDL + seed, generate writes sample files, then the
# framework ingests every enabled operation. No manual SQL editor step required.

resources:
  jobs:
    autoloader_framework_demo:
      name: "[${bundle.target}] Autoloader Framework Demo"
      # Job-level parameter; propagated to every notebook task as the `catalog` widget so
      # one variable (var.catalog, default autoloader_console) retargets setup + generate + run.
      parameters:
        - name: catalog
          default: ${var.catalog}
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: ../src/notebooks/01_setup.py

        - task_key: generate_sample_data
          depends_on:
            - task_key: setup
          notebook_task:
            notebook_path: ../src/notebooks/00_generate_sample_data.py

        - task_key: run_framework
          depends_on:
            - task_key: generate_sample_data
          notebook_task:
            notebook_path: ../src/notebooks/20_run_demo.py

      queue:
        enabled: true
