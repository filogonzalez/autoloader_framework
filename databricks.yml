# Databricks Asset Bundle for the metadata-driven Auto Loader ingestion framework.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: autoloader_framework

variables:
  catalog:
    description: >-
      Unity Catalog catalog for the framework's data layer (metadata / bronze / landing
      schemas + volumes). Change this single value to retarget the whole setup. On
      Default-Storage workspaces the catalog should already exist (created out-of-band with
      a managed location); the setup notebook skips CREATE CATALOG and is otherwise idempotent.
    default: autoloader_console

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405612437610096.16.azuredatabricks.net/
